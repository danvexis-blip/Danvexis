<!DOCTYPE html>
<html>
<head>
  <title>Danvexis Analytics</title>
  <style>
    body { font-family: Arial; background:#0f0f0f; color:#fff; padding:20px; }
    .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
    .card { background:#1c1c1c; padding:20px; border-radius:10px; }
    h1 { color:#00ffcc; }
  </style>
</head>
<body>

<h1>📊 Danvexis Sales Analytics</h1>

<div class="grid">
  <div class="card">
    <h2 id="revenue">$0</h2>
    <p>Total Revenue</p>
  </div>

  <div class="card">
    <h2 id="orders">0</h2>
    <p>Total Orders</p>
  </div>

  <div class="card">
    <h2 id="products">0</h2>
    <p>Products Sold</p>
  </div>
</div>

<h2>🔥 Top Products</h2>
<div id="topProducts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 📊 LOAD ANALYTICS */
async function loadAnalytics() {
  const ordersSnap = await getDocs(collection(db, "orders"));

  let totalRevenue = 0;
  let totalOrders = 0;
  let productCount = 0;
  let productMap = {};

  ordersSnap.forEach(doc => {
    const order = doc.data();
    totalOrders++;
    totalRevenue += order.total;

    order.items.forEach(item => {
      productCount += item.qty;

      if (!productMap[item.name]) {
        productMap[item.name] = 0;
      }
      productMap[item.name] += item.qty;
    });
  });

  document.getElementById("revenue").innerText = "$" + totalRevenue;
  document.getElementById("orders").innerText = totalOrders;
  document.getElementById("products").innerText = productCount;

  /* 🔥 TOP PRODUCTS */
  const sorted = Object.entries(productMap)
    .sort((a,b) => b[1]-a[1])
    .slice(0,5);

  const container = document.getElementById("topProducts");
  container.innerHTML = "";

  sorted.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <h3>${p[0]}</h3>
        <p>Sold: ${p[1]}</p>
      </div>
    `;
  });
}

loadAnalytics();
</script>

</body>
</html>
