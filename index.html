<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Danvexis — Wear The Future</title>

<style>
/* ================= ROOT ================= */
:root{
  --bg:#0a0a0a;
  --card:#111;
  --muted:#888;
  --text:#fff;
  --accent:#ffffff;
  --line:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}

/* ================= NAV ================= */
nav{
  position:fixed;top:0;left:0;width:100%;
  display:flex;justify-content:space-between;
  padding:20px 60px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  z-index:1000;
}
nav h1{letter-spacing:6px;font-size:18px;}
nav ul{display:flex;gap:30px;list-style:none;}
nav ul li{cursor:pointer;color:var(--muted);transition:.3s;}
nav ul li:hover{color:white;}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:120px 60px 60px;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 40%),
    url('https://raw.githubusercontent.com/danvexis-blip/Danvexis/54f2a61be0f81176d8f22671bc68c818cbd57548/A9144A03-7302-4022-A887-79BEE85C0863.jpeg') center/cover;
  position:relative;
}
.hero::after{
  content:"";
  position:absolute;inset:0;
  background:rgba(0,0,0,0.7);
}
.hero-content{
  position:relative;
  max-width:600px;
}
.hero h2{
  font-size:60px;
  letter-spacing:8px;
}
.hero p{color:var(--muted);margin-top:10px;}
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  background:white;
  color:black;
}

/* ================= PRODUCTS ================= */
.section{
  padding:80px 60px;
}
.section h3{
  font-size:28px;
  letter-spacing:4px;
  margin-bottom:30px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:15px;
  transition:.3s;
  cursor:pointer;
}
.card:hover{transform:translateY(-5px);}
.card img{width:100%;height:260px;object-fit:cover;}
.card h4{margin-top:10px;}
.card p{color:var(--muted);font-size:14px;}
.price{margin-top:10px;font-weight:bold;}

.add{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  background:white;
  color:black;
  cursor:pointer;
}

/* ================= CART ================= */
.cart{
  position:fixed;
  right:0;top:0;
  width:350px;height:100%;
  background:#0f0f0f;
  border-left:1px solid var(--line);
  padding:20px;
  transform:translateX(100%);
  transition:.4s;
  z-index:2000;
}
.cart.active{transform:translateX(0);}
.cart h3{margin-bottom:20px;}
.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  border-bottom:1px solid var(--line);
  padding-bottom:10px;
}
.cart-total{
  position:absolute;
  bottom:20px;
  width:90%;
}
.checkout{
  width:100%;
  padding:12px;
  border:none;
  background:white;
  cursor:pointer;
}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.active{display:flex;}
.modal-content{
  background:#111;
  padding:30px;
  width:400px;
  border:1px solid var(--line);
}
.modal img{width:100%;height:300px;object-fit:cover;}

/* ================= FOOTER ================= */
footer{
  padding:40px;
  text-align:center;
  color:var(--muted);
  border-top:1px solid var(--line);
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
  .hero{flex-direction:column;text-align:center;}
  .hero h2{font-size:40px;}
  nav{padding:15px 20px;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h1>DANVEXIS</h1>
  <ul>
    <li onclick="scrollToSection()">Shop</li>
    <li onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>WEAR THE FUTURE</h2>
    <p>Danvexis — Vision. Style. Identity. Premium streetwear engineered for the next generation.</p>
    <button class="btn" onclick="scrollToSection()">Explore Drop</button>
  </div>
</section>

<!-- PRODUCTS -->
<section class="section" id="shop">
  <h3>NEW DROP</h3>
  <div class="products" id="products"></div>
</section>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <div class="cart-total">
    <h4>Total: $<span id="total">0</span></h4>
    <button class="checkout">Checkout</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <img id="modalImg"/>
    <h3 id="modalTitle"></h3>
    <p id="modalPrice"></p>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<footer>
  © 2026 Danvexis. All Rights Reserved.
</footer>

<script>
const products = [
  {id:1,name:"colerd t shirt",price:1450,img:"https://raw.githubusercontent.com/danvexis-blip/Danvexis/refs/heads/main/674a773c-8c6b-4c14-8c65-ac3fb178aaab.jpeg"},
  {id:2,name:"Midnight Hoodie",price:85,img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
  {id:3,name:"Urban Cargo Pants",price:70,img:"https://images.unsplash.com/photo-1520975693413-001a2c6f0c2b"},
  {id:4,name:"Stealth Jacket",price:120,img:"https://images.unsplash.com/photo-1520975928315-8a9c0a1d3b7f"}
];

let cart = [];

const productContainer = document.getElementById("products");

function renderProducts(){
  products.forEach(p=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${p.img}" onclick="openModal(${p.id})"/>
      <h4>${p.name}</h4>
      <p>Premium streetwear</p>
      <div class="price">$${p.price}</div>
      <button class="add" onclick="addToCart(${p.id})">Add to Cart</button>
    `;
    productContainer.appendChild(div);
  });
}

function addToCart(id){
  const item = products.find(p=>p.id===id);
  cart.push(item);
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;
  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML="";
  let total=0;

  cart.forEach((c,i)=>{
    total+=c.price;
    cartItems.innerHTML+=`
      <div class="cart-item">
        <span>${c.name}</span>
        <span>$${c.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function scrollToSection(){
  document.getElementById("shop").scrollIntoView({behavior:"smooth"});
}

function openModal(id){
  const p = products.find(x=>x.id===id);
  document.getElementById("modalImg").src=p.img;
  document.getElementById("modalTitle").innerText=p.name;
  document.getElementById("modalPrice").innerText="Rs"+p.price;
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

renderProducts();
</script>

</body>
</html>
